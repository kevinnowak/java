<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1085 620">
    <title>Java collections framework class hierarchy</title>
    <style>
        .title { text-anchor: middle; font-family: monospace; font-size: 16px; }
        .label { text-anchor: middle; font-family: monospace; font-size: 12px; }
        .class { fill: #e1d5e7; stroke: #9673a6; }
        .abstract { fill: #dae8fc; stroke: #6c8ebf; }
        .interface { fill: #fff2cc; stroke: #d6b656; }
        .extends { stroke: black; fill: none; marker-end: url(#arrow); }
        .implements { stroke: black; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 4.5; }
    </style>
    <defs>
        <marker id="arrow" viewBox="0 0 16 16" refX="16" refY="8" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
            <path d="M 0 0 L 16 8 L 0 16 Z"/>
        </marker>
    </defs>
    <rect width="100%" height="100%" fill="white"/>

    <svg x="10" y="10" overflow="visible">
        <text class="title">
            <tspan x="160" y="32">Java collections framework</tspan>
            <tspan x="160" y="54">class hierarchy</tspan>
        </text>
    </svg>

    <svg x="230" y="10" overflow="visible">
        <g>
            <ellipse cx="195" cy="30" rx="60" ry="20" class="interface"/>
            <text x="195" y="34" class="label">Iterable</text>
        </g>
        <g>
            <ellipse cx="195" cy="90" rx="60" ry="20" class="interface"/>
            <text x="195" y="94" class="label">Collection</text>
            <line x1="195" y1="70" x2="195" y2="50" class="extends"/><!-- Iterable -->
        </g>
        <g>
            <ellipse cx="110" cy="170" rx="80" ry="20" class="interface"/>
            <text x="110" y="174" class="label">SequencedCollection</text>
            <line x1="110" y1="150" x2="180" y2="111" class="extends"/><!-- Collection -->
        </g>
        <g>
            <rect x="210" y="185" width="140" height="40" rx="6" ry="6" class="abstract"/>
            <text x="280" y="209" class="label">AbstractCollection</text>
            <line x1="280" y1="185" x2="210" y2="111" class="implements"/><!-- Collection -->
        </g>
    </svg>

    <svg x="590" y="10" overflow="visible">
        <g>
            <ellipse cx="70" cy="30" rx="60" ry="20" class="interface"/>
            <text x="70" y="34" class="label">Iterator</text>
        </g>
        <g>
            <ellipse cx="70" cy="90" rx="60" ry="20" class="interface"/>
            <text x="70" y="94" class="label">ListIterator</text>
            <line x1="70" y1="70" x2="70" y2="50" class="extends"/><!-- Iterator -->
        </g>
    </svg>

    <svg x="750" y="10" overflow="visible">
        <g>
            <ellipse cx="70" cy="30" rx="60" ry="20" class="interface"/>
            <text x="70" y="34" class="label">Comparable</text>
        </g>
        <g>
            <ellipse cx="70" cy="90" rx="60" ry="20" class="interface"/>
            <text x="70" y="94" class="label">Comparator</text>
        </g>
    </svg>

    <svg x="0" y="220" overflow="visible">
        <g>
            <ellipse cx="60" cy="30" rx="50" ry="20" class="interface"/>
            <text x="60" y="34" class="label">Queue</text>
            <line x1="60" y1="10" x2="380" y2="-105" class="extends"/><!-- Collection -->
        </g>
        <g>
            <ellipse cx="160" cy="100" rx="50" ry="20" class="interface"/>
            <text x="160" y="104" class="label">Deque</text>
            <line x1="160" y1="80" x2="320" y2="-19" class="extends"/><!-- SequencedCollection -->
            <line x1="160" y1="80" x2="80" y2="50" class="extends"/><!-- Queue -->
        </g>
        <g>
            <rect x="10" y="200" width="100" height="40" rx="6" ry="6" class="abstract"/>
            <text x="60" y="224" class="label">AbstractQueue</text>
            <line x1="60" y1="200" x2="60" y2="51" class="implements"/><!-- Queue -->
            <line x1="60" y1="200" x2="470" y2="17" class="extends"/><!-- AbstractCollection -->
        </g>
        <g>
            <rect x="120" y="290" width="80" height="40" class="class"/>
            <text x="160" y="314" class="label">ArrayDeque</text>
            <line x1="160" y1="290" x2="160" y2="121" class="implements"/><!-- Deque -->
            <line x1="160" y1="290" x2="480" y2="17" class="extends"/><!-- AbstractCollection -->
        </g>
        <g>
            <rect x="10" y="290" width="100" height="40" class="class"/>
            <text x="60" y="314" class="label">PriorityQueue</text>
            <line x1="60" y1="290" x2="60" y2="240" class="extends"/><!-- AbstractQueue -->
        </g>
    </svg>

    <svg x="200" y="220" overflow="visible">
        <g>
            <ellipse cx="140" cy="30" rx="50" ry="20" class="interface"/>
            <text x="140" y="34" class="label">List</text>
            <line x1="140" y1="10" x2="140" y2="-19" class="extends"/><!-- SequencedCollection -->
        </g>
        <g>
            <rect x="90" y="200" width="100" height="40" rx="6" ry="6" class="abstract"/>
            <text x="140" y="224" class="label">AbstractList</text>
            <line x1="140" y1="200" x2="140" y2="50" class="implements"/><!-- List -->
            <line x1="140" y1="200" x2="290" y2="17" class="extends"/><!-- AbstractCollection -->
        </g>
        <g>
            <rect x="100" y="290" width="80" height="40" class="class"/>
            <text x="140" y="314" class="label">ArrayList</text>
            <line x1="140" y1="290" x2="140" y2="241" class="extends"/><!-- AbstractList -->
        </g>
        <g>
            <rect x="10" y="290" width="80" height="40" class="class"/>
            <text x="50" y="314" class="label">LinkedList</text>
            <line x1="50" y1="290" x2="120" y2="242" class="extends"/><!-- AbstractList -->
            <line x1="50" y1="290" x2="-20" y2="121" class="implements"/><!-- Deque -->
        </g>
        <g>
            <rect x="190" y="290" width="60" height="40" class="class"/>
            <text x="220" y="314" class="label">Vector</text>
            <line x1="220" y1="290" x2="160" y2="242" class="extends"/><!-- AbstractList -->
        </g>
        <g>
            <rect x="190" y="350" width="60" height="40" class="class"/>
            <text x="220" y="374" class="label">Stack</text>
            <line x1="220" y1="350" x2="220" y2="330" class="extends"/><!-- Vector -->
        </g>
    </svg>

    <svg x="440" y="220" overflow="visible">
        <g>
            <ellipse cx="220" cy="30" rx="50" ry="20" class="interface"/>
            <text x="220" y="34" class="label">Set</text>
            <line x1="220" y1="10" x2="30" y2="-105" class="extends"/><!-- Collection -->
        </g>
        <g>
            <ellipse cx="70" cy="100" rx="60" ry="20" class="interface"/>
            <text x="70" y="104" class="label">SequencedSet</text>
            <line x1="70" y1="80" x2="202" y2="51" class="extends"/><!-- Set -->
            <line x1="70" y1="80" x2="-80" y2="-19" class="extends"/><!-- SequencedCollection -->
        </g>
        <g>
            <ellipse cx="70" cy="160" rx="50" ry="20" class="interface"/>
            <text x="70" y="164" class="label">SortedSet</text>
            <line x1="70" y1="140" x2="70" y2="120" class="extends"/><!-- SequencedSet -->
        </g>
        <g>
            <ellipse cx="70" cy="220" rx="50" ry="20" class="interface"/>
            <text x="70" y="224" class="label">NavigableSet</text>
            <line x1="70" y1="200" x2="70" y2="180" class="extends"/><!-- SortedSet -->
        </g>
        <g>
            <rect x="170" y="200" width="100" height="40" rx="6" ry="6" class="abstract"/>
            <text x="220" y="224" class="label">AbstractSet</text>
            <line x1="220" y1="200" x2="220" y2="51" class="implements"/><!-- Set -->
            <line x1="220" y1="200" x2="100" y2="17" class="extends"/><!-- AbstractCollection -->
        </g>
        <g>
            <rect x="40" y="290" width="60" height="40" class="class"/>
            <text x="70" y="314" class="label">TreeSet</text>
            <line x1="70" y1="290" x2="70" y2="240" class="implements"/><!-- NavigableSet -->
            <line x1="70" y1="290" x2="190" y2="242" class="extends"/><!-- AbstractSet -->
        </g>
        <g>
            <rect x="115" y="290" width="60" height="40" class="class"/>
            <text x="145" y="314" class="label">EnumSet</text>
            <line x1="145" y1="290" x2="208" y2="242" class="extends"/><!-- AbstractSet -->
        </g>
        <g>
            <rect x="190" y="290" width="60" height="40" class="class"/>
            <text x="220" y="314" class="label">HashSet</text>
            <line x1="220" y1="290" x2="220" y2="241" class="extends"/><!-- AbstractSet -->
        </g>
        <g>
            <rect x="170" y="350" width="100" height="40" class="class"/>
            <text x="220" y="374" class="label">LinkedHashSet</text>
            <line x1="220" y1="350" x2="220" y2="330" class="extends"/><!-- HashSet -->
            <path d="M 183 350 L 183 290 L 110 117" class="implements"/><!-- SequencedSet -->
        </g>
    </svg>

    <svg x="705" y="220" overflow="visible">
        <g>
            <ellipse cx="220" cy="30" rx="50" ry="20" class="interface"/>
            <text x="220" y="34" class="label">Map</text>
        </g>
        <g>
            <ellipse cx="70" cy="100" rx="60" ry="20" class="interface"/>
            <text x="70" y="104" class="label">SequencedMap</text>
            <line x1="70" y1="80" x2="202" y2="51" class="extends"/><!-- Map -->
        </g>
        <g>
            <ellipse cx="70" cy="160" rx="50" ry="20" class="interface"/>
            <text x="70" y="164" class="label">SortedMap</text>
            <line x1="70" y1="140" x2="70" y2="120" class="extends"/><!-- SequencedMap -->
        </g>
        <g>
            <ellipse cx="70" cy="220" rx="50" ry="20" class="interface"/>
            <text x="70" y="224" class="label">NavigableMap</text>
            <line x1="70" y1="200" x2="70" y2="180" class="extends"/><!-- SortedMap -->
        </g>
        <g>
            <rect x="170" y="200" width="100" height="40" rx="6" ry="6" class="abstract"/>
            <text x="220" y="224" class="label">AbstractMap</text>
            <line x1="220" y1="200" x2="220" y2="51" class="implements"/><!-- Map -->
        </g>
        <g>
            <rect x="40" y="290" width="60" height="40" class="class"/>
            <text x="70" y="314" class="label">TreeMap</text>
            <line x1="70" y1="290" x2="70" y2="240" class="implements"/><!-- NavigableMap -->
            <line x1="70" y1="290" x2="190" y2="242" class="extends"/><!-- AbstractMap -->
        </g>
        <g>
            <rect x="115" y="290" width="60" height="40" class="class"/>
            <text x="145" y="314" class="label">EnumMap</text>
            <line x1="145" y1="290" x2="208" y2="242" class="extends"/><!-- AbstractSet -->
        </g>
        <g>
            <rect x="190" y="290" width="60" height="40" class="class"/>
            <text x="220" y="314" class="label">HashMap</text>
            <line x1="220" y1="290" x2="220" y2="241" class="extends"/><!-- AbstractMap -->
        </g>
        <g>
            <rect x="170" y="350" width="100" height="40" class="class"/>
            <text x="220" y="374" class="label">LinkedHashMap</text>
            <line x1="220" y1="350" x2="220" y2="330" class="extends"/><!-- HashMap -->
            <path d="M 183 350 L 183 290 L 110 117" class="implements"/><!-- SequencedMap -->
        </g>
        <g>
            <rect x="290" y="200" width="80" height="40" rx="6" ry="6" class="abstract"/>
            <text x="330" y="224" class="label">Dictionary</text>
        </g>
        <g>
            <rect x="290" y="290" width="80" height="40" class="class"/>
            <text x="330" y="314" class="label">Hashtable</text>
            <line x1="330" y1="290" x2="330" y2="240" class="extends"/><!-- Dictionary -->
            <line x1="295" y1="290" x2="240" y2="50" class="implements"/><!-- Map -->
        </g>
        <g>
            <rect x="290" y="350" width="80" height="40" class="class"/>
            <text x="330" y="374" class="label">Properties</text>
            <line x1="330" y1="350" x2="330" y2="330" class="extends"/><!-- Hashtable -->
        </g>
    </svg>

    <svg x="935" y="10" overflow="visible">
        <rect x="0" y="0" width="140" height="198" fill="none" stroke="black"/>
        <g>
            <ellipse cx="70" cy="25" rx="60" ry="15" class="interface"/>
            <text x="70" y="29" class="label">interface</text>
        </g>
        <g>
            <rect x="10" y="50" width="120" height="30" rx="4" ry="4" class="abstract"/>
            <text x="70" y="69" class="label">abstract class</text>
        </g>
        <g>
            <rect x="20" y="90" width="100" height="30" class="class"/>
            <text x="70" y="109" class="label">class</text>
        </g>
        <g>
            <line x1="25" y1="140" x2="115" y2="140" class="extends"/>
            <text x="70" y="155" class="label">extends</text>
        </g>
        <g>
            <line x1="25" y1="170" x2="115" y2="170" class="implements"/>
            <text x="70" y="187" class="label">implements</text>
        </g>
    </svg>

</svg>